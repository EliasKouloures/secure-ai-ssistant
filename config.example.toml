[app]
title = "Sekretariat-Copilot"
locale = "en-GB"
bind_host = "127.0.0.1"
bind_port = 8501
database_path = "data/sekretariat.db"

[backend]
provider_name = "lm_studio"
base_url = "http://127.0.0.1:1234/v1"
model_id = "meta-llama-3.1-8b-instruct"
temperature = 0.2
max_tokens = 900
context_limit = 8192
timeout_seconds = 120
supports_vision = false
api_key = "local"

[storage]
retain_audit_days = 30
save_raw_inputs = false

[limits]
max_assets = 5
max_file_mb = 10
max_pdf_pages = 10

[features]
enable_intranet_mode = false
allow_export_bundle = false
show_privacy_panel = true
